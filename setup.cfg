[flake8]
max-line-length = 120
exclude =
    migrations,
    __pycache__,
    venv,
    .git,
    node_modules,
    apps/accounts/serializers.py,
    apps/accounts/views.py,
    apps/accounts/models.py,
    apps/core/exceptions.py
ignore =
    E501,
    W503,
    E203,
    F401,
    W291,
    W293
per-file-ignores =
    apps/accounts/serializers.py:E501
    apps/accounts/views.py:E501